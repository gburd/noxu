name: spec
# Runs every Stateright executable specification under
# crates/noxu-spec/. Each spec is a Rust test case; failures print a
# concrete counterexample trace. Replaces the prior tla/ workflow.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  spec:
    name: noxu-spec (Stateright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-spec-${{ hashFiles('**/Cargo.lock') }}
      - name: Run all specs
        run: cargo test -p noxu-spec --release
