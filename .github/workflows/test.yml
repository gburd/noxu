name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install build prerequisites (libssl-dev for tls-native)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    # Default-features test on every supported OS.
    # macOS / Windows do NOT exercise rep TLS, observability, or the
    # in-memory test harness — those are covered by `test-all-features`
    # on ubuntu-latest. See docs/src/internal/wave-10-f-ci-matrix.md.
    name: Test default features (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          # Keep cache key distinct from the all-features job so the two
          # don't fight over `target/` (different feature graphs would
          # invalidate each other constantly).
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-default-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-default-

      - name: Run tests (default features, no-fail-fast)
        run: cargo test --workspace --no-fail-fast

  test-all-features:
    # All-features build *runs* on ubuntu-latest only.
    # `--all-features` enables `tls-native` (system OpenSSL), `tls-rustls`,
    # `quic`, `observability`, and the rep `test-harness`. We deliberately
    # skip macOS / Windows here to keep the toolchain story simple
    # (no vcpkg / brew openssl gymnastics in CI). See
    # docs/src/internal/wave-10-f-ci-matrix.md for the rationale.
    name: Test all features (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install build prerequisites (libssl-dev for tls-native)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-allfeat-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-allfeat-

      - name: Run tests (--all-features, no-fail-fast)
        run: cargo test --workspace --all-features --no-fail-fast

  cross:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          # AArch64 Linux — AWS Graviton, Raspberry Pi 4, Apple Silicon VMs
          - target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          # ARMv7 Linux — Raspberry Pi 2/3, embedded SBCs
          - target: armv7-unknown-linux-gnueabihf
            linker: arm-linux-gnueabihf-gcc
            apt: gcc-arm-linux-gnueabihf
          # RISC-V 64-bit Linux
          - target: riscv64gc-unknown-linux-gnu
            linker: riscv64-linux-gnu-gcc
            apt: gcc-riscv64-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable + cross target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-linker
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cross-${{ matrix.target }}-

      # `cargo check` only — running tests on foreign architectures would
      # require qemu-user setup, which is brittle and slow. Cross-compile
      # validation catches build-time portability bugs, which is the
      # 90% case for what we want to catch on these targets.
      - name: Cross-compile (check only — no runner for foreign arch)
        run: cargo check --workspace --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Build Rust API documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Cache mdBook binaries
        id: cache-mdbook
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: mdbook-0.4.40-mermaid-0.13.0

      - name: Install mdBook
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: |
          cargo install mdbook --version 0.4.40 --locked
          cargo install mdbook-mermaid --version 0.13.0 --locked

      - name: Build mdBook documentation
        run: mdbook build docs/
