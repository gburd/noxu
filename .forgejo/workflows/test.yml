name: CI
# Forgejo (Codeberg) variant of the test workflow. The
# .github/workflows/test.yml uses GitHub-only labels (ubuntu-latest,
# macos-latest, windows-latest) and is invisible to Codeberg.
# This file runs the same gates Codeberg can support: fmt, clippy,
# test (default features), test (--all-features), doc, on a single
# linux runner. macOS / Windows coverage lives in the GitHub workflow.
# See docs/src/internal/wave-10-f-ci-matrix.md for the matrix rationale.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: lxc-bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal \
                --component rustfmt --component clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cargo clippy --workspace --all-targets \
            --all-features -- -D warnings

  test:
    # Default-features test on Codeberg's only-Linux runners. Mirrors the
    # GitHub `test` job for ubuntu-latest. macOS / Windows coverage lives
    # in the GitHub workflow only — Forgejo doesn't offer those runners.
    name: Test default features (linux)
    runs-on: lxc-bookworm
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          # Distinct cache key from `test-all-features` to avoid the two
          # jobs invalidating each other's `target/` (different feature
          # graphs).
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-default-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-default-

      - name: Run workspace tests (default features)
        run: cargo test --workspace --no-fail-fast

  test-all-features:
    # Mirror of the GitHub `test-all-features` job. Exercises
    # `tls-native` (system OpenSSL), `tls-rustls`, `quic`,
    # `observability`, and the rep `test-harness` feature. See
    # docs/src/internal/wave-10-f-ci-matrix.md for the matrix design.
    name: Test all features (linux)
    runs-on: lxc-bookworm
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-allfeat-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-allfeat-

      - name: Run workspace tests (--all-features)
        run: cargo test --workspace --all-features --no-fail-fast

  doc:
    name: Documentation
    runs-on: lxc-bookworm
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Build Rust API documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  semver-checks:
    # Advisory SemVer gate — mirrors the GitHub workflow job.  See
    # docs/src/contributing/semver-policy.md for promotion criteria.
    name: SemVer checks (advisory)
    runs-on: lxc-bookworm
    needs: check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-semver-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-semver-

      - name: Install cargo-semver-checks (pinned)
        run: cargo install cargo-semver-checks --version 0.47.0 --locked

      - name: Run cargo-semver-checks
        run: cargo semver-checks --workspace --baseline-rev main
