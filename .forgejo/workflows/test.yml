name: CI
# Forgejo (Codeberg) variant of the test workflow. The
# .github/workflows/test.yml uses GitHub-only labels (ubuntu-latest,
# macos-latest, windows-latest) and is invisible to Codeberg.
# This file runs the same gates Codeberg can support: fmt, clippy,
# test, doc, on a single linux runner.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: lxc-bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal \
                --component rustfmt --component clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cargo clippy --workspace --all-targets \
            --all-features -- -D warnings

  test:
    name: Test (linux)
    runs-on: lxc-bookworm
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run workspace tests
        run: cargo test --workspace --no-fail-fast

  doc:
    name: Documentation
    runs-on: lxc-bookworm
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Build Rust API documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
