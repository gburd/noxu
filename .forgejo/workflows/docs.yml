name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.forgejo/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.forgejo/workflows/docs.yml'

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.4.40"
  MDBOOK_MERMAID_VERSION: "0.13.0"

jobs:
  spell:
    name: Spell check (typos)
    runs-on: lxc-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install typos and check spelling
        run: |
          apt-get install -qy curl
          curl -fsSL \
            https://github.com/crate-ci/typos/releases/latest/download/typos-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /usr/local/bin ./typos
          typos docs/src/

  prose:
    name: Markdown lint (markdownlint-cli2)
    runs-on: lxc-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install Node and lint markdown
        run: |
          apt-get install -qy nodejs npm
          npm install -g markdownlint-cli2
          markdownlint-cli2 "docs/src/**/*.md"

  build-deploy:
    name: Build and deploy mdBook
    runs-on: lxc-bookworm
    needs: [spell, prose]
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook from pre-built binaries
        run: |
          apt-get install -qy curl
          # mdbook
          curl -fsSL \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin
          # mdbook-mermaid
          curl -fsSL \
            "https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Build book
        run: mdbook build docs/
        env:
          MDBOOK_OUTPUT__HTML__SITE_URL: /noxu/
          MDBOOK_OUTPUT__HTML__GIT_REPOSITORY_URL: https://codeberg.org/gregburd/noxu

      - name: Deploy to pages branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd docs/book
          git init
          git config user.email "ci@noxu-db"
          git config user.name "Forgejo CI"
          git checkout -b pages
          git add -A
          git commit -m "docs: deploy ${GITHUB_SHA:0:8}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@codeberg.org/gregburd/noxu.git" \
            pages:pages
