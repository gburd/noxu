name: spec
# Runs every Stateright executable specification under
# crates/noxu-spec/. Each spec is a Rust test case; failures print a
# concrete counterexample trace.
#
# This is the Forgejo (Codeberg) variant of the workflow.  The
# .github/workflows/spec.yml uses the GitHub `ubuntu-latest` label
# and is invisible to Codeberg's runners — Codeberg only scans
# .forgejo/workflows/ once that directory exists, and it uses
# Codeberg-specific runner labels (`lxc-bookworm`).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: spec-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec:
    name: noxu-spec (Stateright)
    runs-on: lxc-bookworm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build prerequisites
        run: |
          apt-get update -q
          apt-get install -qy curl build-essential pkg-config libssl-dev

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-spec-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-spec-

      - name: Run noxu-spec tests
        run: cargo test -p noxu-spec --release
