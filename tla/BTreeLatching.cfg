SPECIFICATION Spec

CONSTANTS
    MaxThreads = 2
    MaxKeys = 2
    BinCapacity = 1

INVARIANTS
    TypeOK
    LockInvariant
    AtMostOneSplit
    NoLostWrites

\* Liveness omitted: with WF_vars(Next) the liveness check (EventuallyDone)
\* would explode the state space well past TLC's available memory. The
\* safety properties above are the correctness statement that matters
\* (the noxu code uses parking_lot which provides fairness; what we want
\* the model to verify is that the protocol cannot lose writes or admit
\* multiple concurrent splits, both of which are state-reachable
\* properties already covered by the invariants).

CHECK_DEADLOCK FALSE
