# cargo-deny configuration for Noxu DB
# Run: cargo deny check  (or `make deny`)

[advisories]
# Security vulnerabilities are always denied (the default in current
# cargo-deny when an advisory matches; severity strings were removed from the
# schema). `unmaintained` accepts "all"/"workspace"/"transitive"/"none".
unmaintained = "workspace"
yanked = "deny"
# Advisory IDs to ignore (none currently).
ignore = []

[licenses]
# version = 2 schema: an empty/unknown license is denied by default; only the
# allow-list below is permitted.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
