[book]
title = "Noxu DB Documentation"
description = "An embedded transactional key-value database — a faithful Rust port of Berkeley DB Java Edition."
authors = ["The Noxu DB Contributors"]
language = "en"
src = "src"

[rust]
edition = "2021"

[build]
build-dir = "book"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"
renderer = ["html"]

# Link checking is done by lychee in CI (see .github/workflows/docs.yml)
# rather than as an mdBook preprocessor, because mdbook-linkcheck has
# compatibility issues with mdBook 0.4.40.

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/gburd/lamdb"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/gburd/lamdb/edit/main/docs/src/{path}"
# site-url is overridden per-deploy via MDBOOK_OUTPUT__HTML__SITE_URL env var:
#   GitHub Pages:  /lamdb/
#   Codeberg Pages: /
site-url = "/lamdb/"
fold.enable = true
fold.level = 1

[output.html.search]
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true

[output.html.playground]
editable = false
line-numbers = true
