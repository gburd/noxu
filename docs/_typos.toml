[default.extend-words]
# Noxu DB proper nouns and technical identifiers
"Noxu"      = "Noxu"
"noxu"      = "noxu"
"VLSN"      = "VLSN"       # Virtual Log Sequence Number
"CBVLSN"    = "CBVLSN"     # Committed Barrier VLSN
"FPaxos"    = "FPaxos"     # Flexible Paxos
"Paxos"     = "Paxos"
"NDB"       = "NDB"        # .ndb file extension
"BIN"       = "BIN"        # Bottom Internal Node
"LN"        = "LN"         # Leaf Node
"QUIC"      = "QUIC"       # Transport protocol (RFC 9000)
"quoracle"  = "quoracle"   # quorum system library
"PMTUD"     = "PMTUD"      # Path MTU Discovery
"crc32fast" = "crc32fast"  # crate name
"nextest"   = "nextest"    # cargo-nextest
"ser"       = "ser"        # EntitySerializer variable name in code samples
"DNE"       = "DNE"        # "does not exist" (audit shorthand)

[files]
extend-exclude = [
    "book/",
    "*.lock",
    # JE TCK enumeration TSVs echo JE's own test method names verbatim,
    # including any typos that exist in those names.  Spell-checking
    # would diverge from the source.
    "je-tck-port-*.tsv",
]
