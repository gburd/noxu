# Woodpecker CI — Noxu DB documentation pipeline
# Runs on Codeberg (https://codeberg.org/gregburd/noxu).
#
# One-time setup required in Woodpecker repository settings:
#   Secret name : CODEBERG_TOKEN
#   Secret value: a Codeberg personal access token with "repository" scope
#                 (Settings → Applications → Generate Token)
#   Limit to   : push events on the main branch only
#
# Codeberg Pages will serve docs/book/ at:
#   https://gregburd.codeberg.page/noxu/

when:
  branch: main
  event: push

steps:
  spell:
    image: alpine:3.20
    commands:
      - apk add --no-cache curl tar
      - |
        curl -fsSL \
          https://github.com/crate-ci/typos/releases/latest/download/typos-x86_64-unknown-linux-musl.tar.gz \
          | tar xz -C /usr/local/bin ./typos
      - typos docs/src/

  prose:
    image: node:lts-alpine
    commands:
      - npm install -g markdownlint-cli2
      - markdownlint-cli2 "docs/src/**/*.md"

  build:
    image: rust:1.82-slim
    environment:
      MDBOOK_OUTPUT__HTML__SITE_URL: /noxu/
      MDBOOK_OUTPUT__HTML__GIT_REPOSITORY_URL: https://codeberg.org/gregburd/noxu
      CARGO_HOME: /woodpecker/cargo-cache
    commands:
      - export PATH="$CARGO_HOME/bin:$PATH"
      - cargo install mdbook --version 0.4.40 --locked
      - cargo install mdbook-mermaid --version 0.13.0 --locked
      - mdbook build docs/

  deploy:
    image: alpine/git:latest
    secrets:
      - CODEBERG_TOKEN
    environment:
      GIT_AUTHOR_NAME: Woodpecker CI
      GIT_AUTHOR_EMAIL: ci@noxu-db
      GIT_COMMITTER_NAME: Woodpecker CI
      GIT_COMMITTER_EMAIL: ci@noxu-db
    commands:
      - cd docs/book
      - git init
      - git checkout -b pages
      - git add -A
      - git commit -m "docs: deploy ${CI_COMMIT_SHA:0:8}"
      - git push --force
          "https://gregburd:$CODEBERG_TOKEN@codeberg.org/gregburd/noxu.git"
          pages:pages
